  const _CHAPTERS_LEGACY = [
    {
      title: "Co je Akce T4?",
      subtitle: "Úvod do programu",
      rights: [
        { label: "Právo na život", ref: "čl. 6 Listiny základních práv a svobod ČR" },
        { label: "Lidská důstojnost a právo na ochranu dobré pověsti", ref: "čl. 10 LZPS ČR / čl. 1 Listiny EU" }
      ],
      video: null,
      content: `<p>Akce T4 (německy <em>Aktion T4</em>) byl tajný nacistický program eutanázie, realizovaný v Německu v letech 1939–1941, který se poté transformoval do skryté formy pokračující až do konce druhé světové války.</p>
<p style="margin-top:1rem">Název pochází od adresy koordinačního centra – <strong style="color:#EAB308">Tiergartenstraße 4</strong> v Berlíně, odkud byl celý program řízen.</p>
<p style="margin-top:1rem">Cílem programu bylo systematicky usmrtit osoby, které nacistická ideologie označovala jako <em>„unwertes Leben"</em> – „život hodný záhuby". Jednalo se především o osoby s mentálním nebo fyzickým postižením, psychiatrickými diagnózami nebo chronickými nemocemi, které nacisté považovali za „zátěž pro společnost".</p>
<p style="margin-top:1rem">Program nebyl spontánní akcí – byl pečlivě organizovanou státní operací, na níž se podíleli lékaři, správci nemocnic, úředníci i vědecké instituce. Přesto byl přísně utajován před veřejností.</p>
<h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;margin-top:1.75rem;margin-bottom:0.5rem;color:#EAB308">Základní fakta</h3>
<ul style="list-style:disc;padding-left:1.5rem;line-height:2;color:#d1d5db">
  <li>Zahájen: <strong>1939</strong></li>
  <li>Formálně zastaven: <strong>srpen 1941</strong> (tajně pokračoval do roku 1945)</li>
  <li>Počet obětí: odhadovaných <strong>200 000–300 000</strong> osob</li>
  <li>Koordinační centrum: Berlín, Tiergartenstraße 4</li>
  <li>Součást nacistické politiky eugeniky a rasové „hygieny"</li>
</ul>`,
      noteQ: "Jak byste vlastními slovy vysvětlili, co bylo cílem Akce T4? Co vás na zjištěných faktech nejvíce zaujalo nebo šokovalo?"
    },
    {
      title: "Historické pozadí",
      subtitle: "Cesta k programu",
      rights: [
        { label: "Nedotknutelnost osoby a její soukromí", ref: "čl. 7 LZPS ČR" },
        { label: "Osobní svoboda", ref: "čl. 8 LZPS ČR" }
      ],
      video: null,
      content: `<p>Kořeny programu T4 sahají do nacistické eugeniky a rasové <em>„hygieny"</em> (<em>Rassenhygiene</em>). Tyto pseudovědecké teorie pronikly do německé lékařské praxe a vzdělání již před Hitlerovým nástupem k moci.</p>
<h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;margin-top:1.75rem;margin-bottom:0.5rem;color:#EAB308">Zákon o sterilizaci (1933)</h3>
<p>Po Hitlerově nástupu k moci vstoupil v platnost zákon <em>„Gesetz zur Verhütung erbkranken Nachwuchses"</em> – zákon o prevenci dědičně nemocného potomstva. Na jeho základě bylo povinně sterilizováno přibližně <strong>400 000 osob</strong>. Zákon se vztahoval na osoby s diagnostikovanou schizofrenií, epilepsií, vrozenou mentální retardací, dědičnou hluchotou nebo slepotou a dalšími stavy.</p>
<h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;margin-top:1.75rem;margin-bottom:0.5rem;color:#EAB308">Ideologický základ</h3>
<p>Nacistická propaganda šířila představu, že „méněcenné" osoby oslabují „rasový organismus" německého národa. Pojmy jako <em>„balastní existence"</em> nebo <em>„žroutci prostředků"</em> se běžně objevovaly v tisku, filmech i školních učebnicích.</p>
<p style="margin-top:1rem">V září 1939 Hitler podepsal tajný rozkaz zmocňující lékaře k udělení <strong>„milosrdné smrti"</strong> nevyléčitelně nemocným pacientům. Rozkaz byl záměrně antedatován na <strong>1. září 1939</strong> – den vypuknutí druhé světové války – aby bylo snazší ho odůvodnit válečnou nutností.</p>
<blockquote style="border-left:3px solid #4b5563;padding-left:1rem;margin:1.25rem 0;color:#9ca3af;font-style:italic;font-size:0.9rem">
  „Nacistická medicína nepadla z nebe. Byla výsledkem postupného posunu hranic etiky, kdy každý krok se zdál být jen malým a odůvodnitelným."<br>
  <small style="font-style:normal;color:#6b7280">— Robert Jay Lifton, historik medicíny, <em>The Nazi Doctors</em>, 1986</small>
</blockquote>`,
      noteQ: `Jak mohla ideologie „rasové hygieny" proniknout do medicíny – profese, jejímž základním etickým závazkem je „neškodit"? Jakou roli hraje vzdělání a propaganda v utváření morálních hranic?`
    },
    {
      title: "Průběh programu",
      subtitle: "Metody a místa",
      rights: [
        { label: "Zákaz mučení a nelidského nebo ponižujícího zacházení", ref: "čl. 7 odst. 2 LZPS ČR / čl. 4 Listiny EU" },
        { label: "Právo na život", ref: "čl. 2 Listiny základních práv EU" }
      ],
      video: { id: "16Rl4_Er-BGrfxfzZrRX4SnSUKciTMLSD", title: "Dokumentace a svědectví" },
      content: `<p>Pacientům v různých psychiatrických ústavech byl zaslán registrační formulář (tzv. <em>Meldebögen</em>). Komise složená z lékařů – kteří pacienty <strong>nikdy osobně neviděli</strong> – rozhodla na základě formulářů o jejich osudu. Malá červená značka „<strong>+</strong>" znamenala smrt, modré „<strong>–</strong>" přežití. Každý lékař zpracoval denně desítky formulářů.</p>
<h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;margin-top:1.75rem;margin-bottom:0.5rem;color:#EAB308">Šest center eutanázie</h3>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.6rem;margin:1rem 0">
  ${['Bernburg<br><small style="color:#6b7280">Sasko-Anhaltsko</small>','Brandenburg a. d. H.<br><small style="color:#6b7280">Braniborsko</small>','Grafeneck<br><small style="color:#6b7280">Bádensko-Württembersko</small>','Hartheim<br><small style="color:#6b7280">Horní Rakousy</small>','Hadamar<br><small style="color:#6b7280">Hesensko</small>','Sonnenstein<br><small style="color:#6b7280">Sasko</small>'].map(c=>`<div style="background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.18);border-radius:6px;padding:0.65rem 0.8rem;font-size:0.82rem;color:#d1d5db;line-height:1.5">${c}</div>`).join('')}
</div>
<p>V těchto zařízeních byli pacienti usmrcováni <strong>kysličníkem uhelnatým</strong> v plynových komorách maskovaných jako sprchové místnosti – přímý předchůdce technologie použité v holocaustu.</p>
<p style="margin-top:1rem">Rodinám byly odesílány <strong>falešné dopisy</strong> s vymyšlenými příčinami úmrtí (zápal plic, srdeční selhání) a nepravdivými daty. Urny vracené příbuzným mnohdy obsahovaly anonymní popel z krematoria.</p>`,
      noteQ: "Jakou roli hrála anonymita (lékař nikdy pacienta neviděl, rozhodoval jen z papíru) v tomto procesu? Jak ovlivňuje anonymita morální rozhodování obecně? Znáte příklady z dnešní doby?"
    },
    {
      title: "Oběti programu",
      subtitle: "Tváře a příběhy",
      rights: [
        { label: "Právo na ochranu zdraví", ref: "čl. 31 LZPS ČR" },
        { label: "Lidská důstojnost a právo na tělesnou a duševní integritu", ref: "čl. 1 LZPS ČR / čl. 3 Listiny EU" }
      ],
      video: null,
      content: `<p>Odhaduje se, že bylo zavražděno <strong>200 000 až 300 000 osob</strong>. Oběti byly lidé všech věkových skupin – od novorozenců po seniory. Jejich „vinou" byla diagnóza.</p>
<h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;margin-top:1.75rem;margin-bottom:0.5rem;color:#EAB308">Kdo byli oběti</h3>
<p>Program cílil na osoby s diagnostikovanou schizofrenií, epilepsií, demencí, mentálním postižením, mozkovou obrnou, ale i na pacienty s tuberkulózou nebo alkoholismem. Mezi oběťmi byli také <strong>váleční veteráni</strong> z první světové války trpící posttraumatickým stresem – ti samí muži, kteří kdysi bojovali za Německo.</p>
<h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;margin-top:1.75rem;margin-bottom:0.5rem;color:#EAB308">Dětský program</h3>
<p>Součástí T4 byl i <em>Kinderaktion</em> – program cílený na děti. Lékaři a porodní asistenti byli povinni hlásit novorozence s postižením. Děti poté umíraly v „léčebných odděleních" hladem nebo předávkováním – pod záminkou zvláštní léčby.</p>
<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:1.25rem;margin-top:1.25rem">
  <p style="color:#6b7280;font-size:0.8rem;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Připomínáme jména</p>
  <p style="margin-bottom:0.5rem"><strong style="color:#EAB308">Ernst Lossa</strong> <span style="color:#6b7280;font-size:0.8rem">— nar. 1929, zavražděn 1944 ve věku 13 let v ústavu Kaufbeuren-Irsee</span></p>
  <p style="margin-bottom:0.5rem"><strong style="color:#EAB308">Elvira Manthey</strong> <span style="color:#6b7280;font-size:0.8rem">— zavražděna ve věku 7 let</span></p>
  <p style="margin-bottom:0.5rem"><strong style="color:#EAB308">Richard Jenne</strong> <span style="color:#6b7280;font-size:0.8rem">— poslední dokumentovaná oběť dětského programu, zemřel 29. května 1945 — sedm týdnů po kapitulaci Německa</span></p>

    const view = parts[0];
    const param = parts[1];

    if (view === 'brochure' || view === 'summary') {
      if (!state.quizDone) { state.view = 'quiz'; render(); return; }
    }

    if (view === 'brochure') {
      const ch = parseInt(param);
      if (!isNaN(ch) && ch >= 0 && ch < CHAPTERS.length) state.chapter = ch;
      state.view = 'brochure';
      closeSidebar();
    } else if (['home','quiz','summary','sources'].includes(view)) {
      state.view = view;
    } else {
      state.view = 'home';

    window.scrollTo(0, 0);
    render();
